<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Shed Build</title>
<meta name="description" content="Two friends, one shed. The build, told from two sides." />
<style>
  :root {
    --bg: #1a1612;
    --panel: #221d18;
    --ink: #f4ece1;
    --muted: #b6a99a;
    --accent: #d8a657;
    --rule: #3a312a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: clamp(24px, 5vw, 56px) clamp(20px, 5vw, 40px) 80px;
  }
  header { text-align: center; margin-bottom: clamp(32px, 6vw, 56px); }
  h1 {
    font-size: clamp(2rem, 6vw, 3.25rem);
    margin: 0 0 12px;
    letter-spacing: -0.02em;
    font-weight: 700;
  }
  .tagline { color: var(--muted); font-size: 1.05rem; margin: 0; }
  .rule {
    border: 0;
    border-top: 1px solid var(--rule);
    margin: clamp(32px, 5vw, 48px) auto;
    width: 60px;
  }
  .video {
    background: var(--panel);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: clamp(28px, 5vw, 44px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  .video h2 {
    margin: 0;
    padding: 18px 22px 14px;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .video h2 .by { color: var(--muted); font-weight: 400; font-size: 0.95rem; margin-left: 8px; }
  .embed {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .embed iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 48px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <header>
    <h1>The Shed Build</h1>
    <p class="tagline">Two friends, one shed — told from both sides of the camera.</p>
  </header>

  <section class="video">
    <h2>The Swedish Makers build video <span class="by">(theswedishmaker)</span></h2>
    <div class="embed">
      <iframe
        src="https://www.youtube.com/embed/LGJpQ7bh-Pw"
        title="The Swedish Makers shed build video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>
    </div>
  </section>

  <section class="video">
    <h2>Steve Bell Creates build video <span class="by">(stevebellcreates)</span></h2>
    <div class="embed">
      <iframe
        src="https://www.youtube.com/embed/hYOZ0TOEFHA"
        title="Steve Bell Creates shed build video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>
    </div>
  </section>

  <hr class="rule" />

  <footer>
    Built together · Two stories
  </footer>
</main>
</body>
</html>
